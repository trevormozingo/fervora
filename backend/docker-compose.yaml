name: backend

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --eval "
          try { rs.status().ok }
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  graphql-service:
    build:
      context: profile-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  event-listener:
    build:
      context: event-listener-service
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  event-worker:
    build:
      context: event-worker-service
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  test-client:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      SERVICE_URL: http://graphql-service:8000
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora_test
      REDIS_URL: redis://redis:6379
    depends_on:
      graphql-service:
        condition: service_healthy
