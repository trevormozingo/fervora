services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --eval "
          try { rs.status().ok }
          catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_PLUGINS: rabbitmq_consistent_hash_exchange
    healthcheck:
      test: >
        rabbitmq-diagnostics -q ping &&
        rabbitmq-plugins is_enabled rabbitmq_consistent_hash_exchange
      interval: 5s
      timeout: 10s
      retries: 10
    entrypoint: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_consistent_hash_exchange &&
             docker-entrypoint.sh rabbitmq-server"

  profile-service:
    build:
      context: profile-service
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora_test
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PROFILE_SERVICE_URL: http://profile-service:8000
    depends_on:
      profile-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  change-stream-listener:
    build:
      context: change-stream-listener
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora_test
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-client:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      SERVICE_URL: http://api-gateway:8080
      MONGO_URI: mongodb://mongodb:27017/?replicaSet=rs0&directConnection=true
      MONGO_DB: fervora_test
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      api-gateway:
        condition: service_healthy
      change-stream-listener:
        condition: service_healthy
